<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لیست لینک‌های من</title>
    <!-- فونت زیبا از گوگل -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 720px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.25rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 1.5rem;
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-card {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 1.5rem;
            padding: 0.9rem 1.5rem;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.04);
            text-decoration: none;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 1.5rem;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.6);
        }

        .link-card:hover::before {
            opacity: 1;
        }

        /* آیکون شماره یا emoji */
        .link-icon {
            font-size: 1.6rem;
            margin-left: 1rem;
            width: 2.8rem;
            height: 2.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 1rem;
            flex-shrink: 0;
            transition: 0.2s;
        }

        .link-card:hover .link-icon {
            background: rgba(255, 255, 255, 0.14);
            transform: rotate(2deg) scale(1.05);
        }

        .link-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }

        .link-title {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #f0f0ff;
        }

        .link-desc {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.45);
            font-weight: 400;
        }

        .link-arrow {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.25);
            transition: 0.3s ease;
            margin-right: 0.5rem;
        }

        .link-card:hover .link-arrow {
            color: #a78bfa;
            transform: translateX(-4px);
        }

        /* تنوع رنگ آیکون‌ها با کلاس‌های مختلف */
        .icon-purple .link-icon { background: rgba(167, 139, 250, 0.2); }
        .icon-blue .link-icon { background: rgba(96, 165, 250, 0.2); }
        .icon-green .link-icon { background: rgba(52, 211, 153, 0.2); }
        .icon-pink .link-icon { background: rgba(244, 114, 182, 0.2); }
        .icon-orange .link-icon { background: rgba(251, 146, 60, 0.2); }
        .icon-cyan .link-icon { background: rgba(34, 211, 238, 0.2); }

        .icon-purple:hover .link-icon { background: rgba(167, 139, 250, 0.35); }
        .icon-blue:hover .link-icon { background: rgba(96, 165, 250, 0.35); }
        .icon-green:hover .link-icon { background: rgba(52, 211, 153, 0.35); }
        .icon-pink:hover .link-icon { background: rgba(244, 114, 182, 0.35); }
        .icon-orange:hover .link-icon { background: rgba(251, 146, 60, 0.35); }
        .icon-cyan:hover .link-icon { background: rgba(34, 211, 238, 0.35); }

        /* فوتر کوچک */
        .footer-note {
            margin-top: 2.5rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 1.8rem;
            letter-spacing: 0.3px;
        }

        /* ریسپانسیو */
        @media (max-width: 480px) {
            .container { padding: 1.8rem 1.2rem; }
            h1 { font-size: 1.6rem; }
            .link-card { padding: 0.8rem 1.2rem; }
            .link-icon { font-size: 1.3rem; width: 2.4rem; height: 2.4rem; margin-left: 0.8rem; }
            .link-title { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 پیوندهای من</h1>
        <p class="subtitle">هر کارت یک مسیر جدید به دنیای دیجیتال</p>

        <div class="link-list">
            <!-- لینک ۱ -->
            <a href="https://abolfazlkhastavane.github.io/statapps/image-to-pdf/" target="_blank" class="link-card icon-purple">
                <span class="link-icon">🔍</span>
                <span class="link-content">
                    <span class="link-title">تبدیل عکس به PDF</span>
                    <span class="link-desc">تبدیل عکس به PDF</span>
                </span>
                <span class="link-arrow">←</span>
            </a>

            <!-- لینک ۲ -->
            <a href="https://abolfazlkhastavane.github.io/statapps/config-converter/" target="_blank" class="link-card icon-blue">
                <span class="link-icon">🐙</span>
                <span class="link-content">
                    <span class="link-title">💦 VLESS URI Converter</span>
                    <span class="link-desc">💦 VLESS URI Converter</span>
                </span>
                <span class="link-arrow">←</span>
            </a>

            <!-- لینک ۳ -->
            <a href="https://abolfazlkhastavane.github.io/statapps/csv-reader/" target="_blank" class="link-card icon-pink">
                <span class="link-icon">▶️</span>
                <span class="link-content">
                    <span class="link-title">ویرایشگر CSV</span>
                    <span class="link-desc">ویرایشگر CSV</span>
                </span>
                <span class="link-arrow">←</span>
            </a>

           
    </div>
</body>
</html>
