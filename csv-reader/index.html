<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ویرایشگر CSV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;
  --bg2:#171922;
  --bg3:#1e2130;
  --bg4:#252840;
  --surface:#1a1d2e;
  --surface2:#222538;
  --border:#2d3055;
  --border2:#3d4175;
  --accent:#6366f1;
  --accent2:#818cf8;
  --accent3:#4f46e5;
  --green:#10b981;
  --green2:#6ee7b7;
  --red:#ef4444;
  --red2:#fca5a5;
  --amber:#f59e0b;
  --amber2:#fcd34d;
  --text:#e2e8f0;
  --text2:#94a3b8;
  --text3:#64748b;
  --selected-bg:#2d2f6b;
  --selected-border:#6366f1;
  --header-bg:#1a1d35;
  --row-even:#171922;
  --row-odd:#1a1d2a;
  --row-hover:#1e2238;
  --scrollbar:#2d3055;
  --scrollbar-hover:#6366f1;
}
body{
  font-family:'Vazirmatn',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  direction:rtl;
}

/* TOPBAR */
#topbar{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 16px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  flex-wrap:wrap;
}
#logo{
  font-size:15px;
  font-weight:700;
  color:var(--accent2);
  letter-spacing:0.01em;
  display:flex;
  align-items:center;
  gap:6px;
  margin-left:auto;
}
#logo svg{width:22px;height:22px;fill:none;stroke:var(--accent2);stroke-width:2}
#filename-display{
  font-size:13px;
  color:var(--text2);
  background:var(--bg3);
  padding:4px 10px;
  border-radius:6px;
  border:1px solid var(--border);
  max-width:220px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  direction:ltr;
  text-align:left;
}
.btn{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:5px 12px;
  border-radius:6px;
  border:1px solid var(--border2);
  background:var(--bg3);
  color:var(--text);
  font-family:'Vazirmatn',sans-serif;
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
}
.btn:hover{background:var(--bg4);border-color:var(--accent)}
.btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;flex-shrink:0}
.btn-accent{background:var(--accent3);border-color:var(--accent);color:#fff}
.btn-accent:hover{background:var(--accent);border-color:var(--accent2)}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-green:hover{background:rgba(16,185,129,.1)}
.btn-red{border-color:var(--red);color:var(--red)}
.btn-red:hover{background:rgba(239,68,68,.1)}
.btn-amber{border-color:var(--amber);color:var(--amber)}
.btn-amber:hover{background:rgba(245,158,11,.1)}
.separator{width:1px;height:20px;background:var(--border);flex-shrink:0}

/* TOOLBAR */
#toolbar{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 16px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  flex-wrap:wrap;
}
#search-box{
  position:relative;
  display:flex;
  align-items:center;
}
#search-box svg{
  position:absolute;
  right:8px;
  width:14px;height:14px;
  fill:none;stroke:var(--text3);stroke-width:2;
  pointer-events:none;
}
#search-input{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text);
  font-family:'Vazirmatn',sans-serif;
  font-size:12px;
  padding:5px 28px 5px 8px;
  width:180px;
  outline:none;
  transition:border-color .15s;
}
#search-input:focus{border-color:var(--accent)}
#search-input::placeholder{color:var(--text3)}
#stats-bar{
  margin-right:auto;
  font-size:11px;
  color:var(--text3);
  display:flex;
  gap:12px;
}
.stat-chip{
  display:inline-flex;
  align-items:center;
  gap:4px;
}
.stat-chip span:first-child{color:var(--accent2);font-weight:600}
#delimiter-select{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text);
  font-family:'Vazirmatn',sans-serif;
  font-size:12px;
  padding:4px 8px;
  outline:none;
  cursor:pointer;
}
#delimiter-select:focus{border-color:var(--accent)}

/* MAIN */
#main{
  display:flex;
  flex:1;
  overflow:hidden;
}

/* DROP ZONE */
#drop-zone{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
  padding:40px;
  cursor:pointer;
  transition:background .2s;
}
#drop-zone.dragover{background:rgba(99,102,241,.05)}
#drop-icon{
  width:80px;height:80px;
  border-radius:20px;
  background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(129,140,248,.05));
  border:2px dashed var(--border2);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .2s;
}
#drop-zone.dragover #drop-icon{
  border-color:var(--accent);
  background:rgba(99,102,241,.15);
  transform:scale(1.05);
}
#drop-icon svg{width:36px;height:36px;fill:none;stroke:var(--accent2);stroke-width:1.5}
.drop-title{font-size:18px;font-weight:600;color:var(--text)}
.drop-sub{font-size:13px;color:var(--text2);text-align:center;max-width:300px;line-height:1.6}
.drop-hint{font-size:11px;color:var(--text3)}

/* TABLE AREA */
#table-area{
  flex:1;
  overflow:auto;
  display:none;
  position:relative;
}
#table-area::-webkit-scrollbar{width:8px;height:8px}
#table-area::-webkit-scrollbar-track{background:var(--bg2)}
#table-area::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:4px}
#table-area::-webkit-scrollbar-thumb:hover{background:var(--scrollbar-hover)}
#table-area::-webkit-scrollbar-corner{background:var(--bg2)}

#csv-table{
  border-collapse:collapse;
  width:max-content;
  min-width:100%;
  font-size:13px;
  direction:ltr;
}

#csv-table thead th{
  position:sticky;
  top:0;
  z-index:10;
  background:var(--header-bg);
  border:1px solid var(--border);
  padding:0;
  white-space:nowrap;
  user-select:none;
}
.th-inner{
  display:flex;
  align-items:center;
  gap:4px;
  padding:8px 12px;
  cursor:pointer;
  transition:background .1s;
  position:relative;
  min-width:100px;
}
.th-inner:hover{background:rgba(99,102,241,.1)}
.th-label{
  font-size:12px;
  font-weight:600;
  color:var(--accent2);
  letter-spacing:0.02em;
  flex:1;
  overflow:hidden;
  text-overflow:ellipsis;
  direction:rtl;
  text-align:right;
}
.th-sort{
  width:12px;height:12px;
  fill:none;stroke:var(--text3);stroke-width:2;
  flex-shrink:0;
  opacity:0.5;
}
.th-sort.active{stroke:var(--accent2);opacity:1}
.th-resize{
  position:absolute;
  left:0;top:0;bottom:0;
  width:4px;
  cursor:col-resize;
  background:transparent;
  transition:background .15s;
}
.th-resize:hover,.th-resize.resizing{background:var(--accent)}
th.row-num-th{
  width:50px;min-width:50px;
  background:var(--bg2) !important;
  border-color:var(--border);
}
.row-num-head{
  font-size:11px;
  color:var(--text3);
  text-align:center;
  padding:8px 4px;
}

#csv-table tbody tr{
  transition:background .1s;
}
#csv-table tbody tr:nth-child(even){background:var(--row-even)}
#csv-table tbody tr:nth-child(odd){background:var(--row-odd)}
#csv-table tbody tr:hover{background:var(--row-hover)}
#csv-table tbody tr.selected{background:var(--selected-bg) !important}

#csv-table tbody td{
  border:1px solid var(--border);
  padding:0;
  position:relative;
  max-width:300px;
}
td.row-num-td{
  text-align:center;
  color:var(--text3);
  font-size:11px;
  padding:6px 4px;
  background:var(--bg2);
  user-select:none;
  cursor:pointer;
  min-width:50px;
  width:50px;
}
td.row-num-td:hover{color:var(--accent2)}
.cell-inner{
  display:block;
  padding:6px 10px;
  min-height:30px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  cursor:cell;
  direction:rtl;
  text-align:right;
  color:var(--text);
  font-family:'Vazirmatn',sans-serif;
}
td.cell-selected .cell-inner{background:rgba(99,102,241,.12)}
td.cell-editing{border-color:var(--accent) !important;z-index:5}
td.cell-editing .cell-inner{display:none}
.cell-editor{
  width:100%;
  min-height:30px;
  background:var(--surface2);
  border:none;
  color:var(--text);
  font-family:'Vazirmatn',sans-serif;
  font-size:13px;
  padding:6px 10px;
  outline:none;
  resize:none;
  direction:rtl;
  text-align:right;
  display:none;
}
td.cell-editing .cell-editor{display:block}
.cell-search-match{background:rgba(245,158,11,.15) !important}
.cell-search-match.cell-selected{background:rgba(245,158,11,.25) !important}

/* BOTTOM */
#bottom-bar{
  display:flex;
  align-items:center;
  gap:12px;
  padding:6px 16px;
  background:var(--bg2);
  border-top:1px solid var(--border);
  flex-shrink:0;
  font-size:11px;
  color:var(--text3);
}
#cell-ref{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--accent2);
  min-width:60px;
}
#cell-val-preview{
  flex:1;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  direction:rtl;
  color:var(--text2);
}
#mode-indicator{
  display:flex;
  align-items:center;
  gap:4px;
}
.mode-dot{
  width:6px;height:6px;
  border-radius:50%;
  background:var(--green);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* NOTIFICATIONS */
#notif{
  position:fixed;
  bottom:48px;
  left:50%;
  transform:translateX(-50%);
  padding:8px 16px;
  border-radius:8px;
  font-size:13px;
  font-weight:500;
  z-index:1000;
  opacity:0;
  transition:opacity .2s;
  pointer-events:none;
  white-space:nowrap;
}
#notif.show{opacity:1}
#notif.success{background:rgba(16,185,129,.2);border:1px solid var(--green);color:var(--green2)}
#notif.error{background:rgba(239,68,68,.2);border:1px solid var(--red);color:var(--red2)}
#notif.info{background:rgba(99,102,241,.2);border:1px solid var(--accent);color:var(--accent2)}

/* CONTEXT MENU */
#ctx-menu{
  position:fixed;
  background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:4px;
  z-index:500;
  display:none;
  min-width:160px;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
  direction:rtl;
}
.ctx-item{
  display:flex;
  align-items:center;
  gap:8px;
  padding:7px 12px;
  border-radius:5px;
  cursor:pointer;
  font-size:12px;
  color:var(--text);
  transition:background .1s;
}
.ctx-item:hover{background:var(--bg4)}
.ctx-item svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;color:var(--text2)}
.ctx-item.danger{color:var(--red)}
.ctx-item.danger svg{color:var(--red)}
.ctx-sep{height:1px;background:var(--border);margin:3px 8px}

/* HEADER EDIT */
.header-edit-input{
  background:transparent;
  border:none;
  color:var(--accent2);
  font-family:'Vazirmatn',sans-serif;
  font-size:12px;
  font-weight:600;
  width:100%;
  outline:none;
  direction:rtl;
  text-align:right;
}

/* COLUMN TYPE BADGE */
.col-type{
  font-size:9px;
  padding:1px 5px;
  border-radius:3px;
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:0.03em;
  flex-shrink:0;
}
.col-type-text{background:rgba(99,102,241,.2);color:var(--accent2)}
.col-type-num{background:rgba(16,185,129,.2);color:var(--green2)}
.col-type-date{background:rgba(245,158,11,.2);color:var(--amber2)}

/* OVERVIEW PANEL */
#overview{
  width:0;
  overflow:hidden;
  background:var(--surface);
  border-right:1px solid var(--border);
  transition:width .2s;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  direction:rtl;
}
#overview.open{width:220px}
#overview-title{
  font-size:12px;
  font-weight:600;
  color:var(--text2);
  padding:12px 14px 8px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:6px;
}
#col-list{
  overflow-y:auto;
  flex:1;
  padding:6px 0;
}
#col-list::-webkit-scrollbar{width:4px}
#col-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.col-item{
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px 14px;
  cursor:pointer;
  transition:background .1s;
  font-size:12px;
}
.col-item:hover{background:var(--bg3)}
.col-item.active{background:rgba(99,102,241,.12);color:var(--accent2)}
.col-dot{
  width:8px;height:8px;
  border-radius:50%;
  flex-shrink:0;
}
</style>
</head>
<body>

<div id="topbar">
  <div id="logo">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
    ویرایشگر CSV
  </div>
  <div id="filename-display">هیچ فایلی انتخاب نشده</div>
  <div class="separator"></div>
  <button class="btn btn-accent" onclick="document.getElementById('file-input').click()">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
    باز کردن فایل
  </button>
  <input type="file" id="file-input" accept=".csv,.tsv,.txt" style="display:none">
  <button class="btn btn-green" id="save-btn" onclick="saveCSV()" style="display:none">
    <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
    ذخیره CSV
  </button>
  <button class="btn" id="toggle-overview" onclick="toggleOverview()" style="display:none">
    <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    ستون‌ها
  </button>
  <button class="btn btn-amber" id="new-csv-btn" onclick="newCSV()" style="display:none">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    جدول جدید
  </button>
</div>

<div id="toolbar" style="display:none">
  <div id="search-box">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search-input" placeholder="جستجو در داده‌ها..." oninput="searchData(this.value)">
  </div>
  <select id="delimiter-select" onchange="reparse()">
    <option value=",">جداکننده: کاما</option>
    <option value=";">جداکننده: سمیکولن</option>
    <option value="	">جداکننده: Tab</option>
    <option value="|">جداکننده: Pipe</option>
  </select>
  <div class="separator"></div>
  <button class="btn" onclick="addRow()">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    ردیف جدید
  </button>
  <button class="btn" onclick="addColumn()">
    <svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/></svg>
    ستون جدید
  </button>
  <div class="separator"></div>
  <button class="btn btn-red" onclick="deleteSelectedRows()" id="del-row-btn" style="display:none">
    <svg viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
    حذف ردیف
  </button>
  <button class="btn" onclick="copySelectedRows()">
    <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    کپی
  </button>
  <div class="separator"></div>
  <div id="stats-bar">
    <div class="stat-chip"><span id="stat-rows">0</span><span>ردیف</span></div>
    <div class="stat-chip"><span id="stat-cols">0</span><span>ستون</span></div>
    <div class="stat-chip"><span id="stat-sel">0</span><span>انتخاب‌شده</span></div>
  </div>
</div>

<div id="main">
  <div id="overview">
    <div id="overview-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="18"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      ستون‌های جدول
    </div>
    <div id="col-list"></div>
  </div>

  <div id="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div id="drop-icon">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    </div>
    <div class="drop-title">فایل CSV را اینجا رها کنید</div>
    <div class="drop-sub">فایل خود را بکشید و رها کنید یا کلیک کنید تا انتخاب کنید</div>
    <div class="drop-hint">پشتیبانی از CSV، TSV، TXT</div>
  </div>

  <div id="table-area">
    <table id="csv-table" cellspacing="0">
      <thead id="csv-thead"></thead>
      <tbody id="csv-tbody"></tbody>
    </table>
  </div>
</div>

<div id="bottom-bar">
  <span id="cell-ref">—</span>
  <span style="color:var(--border2)">|</span>
  <span id="cell-val-preview">سلولی انتخاب نشده</span>
  <div style="flex:1"></div>
  <div id="mode-indicator"><div class="mode-dot"></div><span>آماده</span></div>
</div>

<div id="notif"></div>

<div id="ctx-menu">
  <div class="ctx-item" onclick="ctxAddRowAbove()">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    درج ردیف بالا
  </div>
  <div class="ctx-item" onclick="ctxAddRowBelow()">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    درج ردیف پایین
  </div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxCopyRow()">
    <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    کپی ردیف
  </div>
  <div class="ctx-item" onclick="ctxPasteRow()">
    <svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
    چسباندن
  </div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="ctxDeleteRow()">
    <svg viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14H6L5 6"/></svg>
    حذف ردیف
  </div>
</div>

<script>
let csvData = [];
let headers = [];
let originalText = '';
let currentFile = null;
let sortCol = -1;
let sortDir = 1;
let selectedRows = new Set();
let selectedCell = null;
let ctxRowIndex = -1;
let copiedRows = [];
let colWidths = [];
let delimiter = ',';
let searchQuery = '';
let isEditing = false;
let undoStack = [];

const colColors = ['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#84cc16','#f97316','#14b8a6'];

function detectDelimiter(text) {
  const sample = text.slice(0, 2000);
  const counts = {',':0,';':0,'\t':0,'|':0};
  for(const ch of sample) if(ch in counts) counts[ch]++;
  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
}

function parseCSV(text, delim) {
  const rows = [];
  let row = [], field = '', inQ = false, i = 0;
  while(i < text.length) {
    const ch = text[i];
    if(inQ) {
      if(ch === '"' && text[i+1] === '"') { field += '"'; i+=2; continue; }
      if(ch === '"') { inQ = false; i++; continue; }
      field += ch;
    } else {
      if(ch === '"') { inQ = true; i++; continue; }
      if(ch === delim) { row.push(field); field = ''; i++; continue; }
      if(ch === '\n' || ch === '\r') {
        row.push(field); field = '';
        if(row.some(c=>c!=='') || rows.length>0) rows.push(row);
        row = [];
        if(ch === '\r' && text[i+1] === '\n') i++;
        i++; continue;
      }
      field += ch;
    }
    i++;
  }
  if(field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function toCSV(data, hdrs, delim) {
  const escape = v => {
    const s = String(v ?? '');
    if(s.includes(delim) || s.includes('"') || s.includes('\n') || s.includes('\r'))
      return '"' + s.replace(/"/g,'""') + '"';
    return s;
  };
  const lines = [hdrs.map(escape).join(delim)];
  for(const row of data) lines.push(row.map(escape).join(delim));
  return lines.join('\n');
}

function detectColType(col, data) {
  let nums = 0, dates = 0, total = 0;
  const dateRe = /^\d{1,4}[-\/]\d{1,2}[-\/]\d{1,4}$|^\d{4}$/;
  for(const row of data) {
    const v = (row[col]||'').trim();
    if(!v) continue;
    total++;
    if(!isNaN(v.replace(/,/g,''))) nums++;
    else if(dateRe.test(v)) dates++;
  }
  if(!total) return 'text';
  if(nums/total > .8) return 'num';
  if(dates/total > .5) return 'date';
  return 'text';
}

function loadFile(file) {
  currentFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    originalText = e.target.result;
    delimiter = detectDelimiter(originalText);
    document.getElementById('delimiter-select').value = delimiter;
    processCSV(originalText);
    document.getElementById('filename-display').textContent = file.name;
    showNotif('فایل با موفقیت بارگذاری شد ✓', 'success');
  };
  reader.readAsText(file, 'UTF-8');
}

function processCSV(text) {
  const rows = parseCSV(text, delimiter);
  if(!rows.length) { showNotif('فایل خالی است', 'error'); return; }
  headers = rows[0];
  csvData = rows.slice(1);
  colWidths = headers.map(() => 140);
  sortCol = -1; sortDir = 1;
  selectedRows.clear(); selectedCell = null;
  renderAll();
  document.getElementById('drop-zone').style.display = 'none';
  document.getElementById('table-area').style.display = 'block';
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('save-btn').style.display = '';
  document.getElementById('toggle-overview').style.display = '';
  document.getElementById('new-csv-btn').style.display = '';
  updateStats();
  buildOverview();
}

function renderAll() {
  renderHeaders();
  renderBody();
  updateStats();
}

function renderHeaders() {
  const thead = document.getElementById('csv-thead');
  let html = '<tr><th class="row-num-th"><div class="row-num-head">#</div></th>';
  headers.forEach((h, i) => {
    const colType = detectColType(i, csvData);
    const typeClass = 'col-type-'+colType;
    const typeLabel = colType==='num'?'عدد':colType==='date'?'تاریخ':'متن';
    const sortActive = sortCol === i;
    const sortIcon = sortActive ? (sortDir===1 ? '↑' : '↓') : '';
    html += `<th style="width:${colWidths[i]}px">
      <div class="th-inner" onclick="sortBy(${i})">
        <span class="col-type ${typeClass}">${typeLabel}</span>
        <span class="th-label" id="th-label-${i}" ondblclick="editHeader(event,${i})">${escH(h)}</span>
        <span style="font-size:10px;color:var(--accent2);min-width:10px">${sortIcon}</span>
      </div>
      <div class="th-resize" onmousedown="startResize(event,${i})"></div>
    </th>`;
  });
  html += '</tr>';
  thead.innerHTML = html;
}

function renderBody() {
  const tbody = document.getElementById('csv-tbody');
  let filtered = csvData;
  let matchSet = new Set();
  if(searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = csvData.filter((row, ri) => {
      const match = row.some(c => String(c||'').toLowerCase().includes(q));
      if(match) matchSet.add(ri);
      return match;
    });
  }
  let html = '';
  const displayData = searchQuery ? filtered : csvData;
  const originalIndices = searchQuery
    ? csvData.map((r,i)=>matchSet.has(i)?i:-1).filter(i=>i>=0)
    : csvData.map((_,i)=>i);

  displayData.forEach((row, di) => {
    const ri = searchQuery ? originalIndices[di] : di;
    const sel = selectedRows.has(ri) ? ' selected' : '';
    html += `<tr class="${sel}" data-row="${ri}" oncontextmenu="showCtx(event,${ri})">`;
    html += `<td class="row-num-td" onclick="selectRow(${ri},event)">${ri+1}</td>`;
    headers.forEach((_, ci) => {
      const val = escH(row[ci] ?? '');
      const isSel = selectedCell && selectedCell[0]===ri && selectedCell[1]===ci ? ' cell-selected' : '';
      const isMatch = searchQuery && String(row[ci]||'').toLowerCase().includes(searchQuery.toLowerCase()) ? ' cell-search-match' : '';
      html += `<td class="${isSel}${isMatch}" data-row="${ri}" data-col="${ci}" onclick="selectCell(${ri},${ci},event)" ondblclick="startEdit(${ri},${ci})">
        <span class="cell-inner" id="cell-${ri}-${ci}">${val}</span>
        <textarea class="cell-editor" id="editor-${ri}-${ci}" onblur="finishEdit(${ri},${ci})" onkeydown="editorKey(event,${ri},${ci})"></textarea>
      </td>`;
    });
    html += '</tr>';
  });
  tbody.innerHTML = html;
}

function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selectCell(ri, ci, e) {
  if(e) e.stopPropagation();
  selectedCell = [ri, ci];
  document.getElementById('cell-ref').textContent = `R${ri+1}C${ci+1}`;
  document.getElementById('cell-val-preview').textContent = csvData[ri]?.[ci] ?? '';
  document.querySelectorAll('td.cell-selected').forEach(t=>t.classList.remove('cell-selected'));
  const td = document.querySelector(`td[data-row="${ri}"][data-col="${ci}"]`);
  if(td) td.classList.add('cell-selected');
}

function startEdit(ri, ci) {
  if(isEditing) return;
  const td = document.querySelector(`td[data-row="${ri}"][data-col="${ci}"]`);
  if(!td) return;
  isEditing = true;
  td.classList.add('cell-editing');
  const editor = document.getElementById(`editor-${ri}-${ci}`);
  editor.value = csvData[ri]?.[ci] ?? '';
  editor.style.display = 'block';
  editor.style.height = 'auto';
  editor.style.height = Math.max(30, editor.scrollHeight) + 'px';
  editor.focus();
  document.getElementById('mode-indicator').innerHTML = '<div class="mode-dot" style="background:var(--amber)"></div><span>ویرایش</span>';
}

function finishEdit(ri, ci) {
  const editor = document.getElementById(`editor-${ri}-${ci}`);
  if(!editor) return;
  const td = document.querySelector(`td[data-row="${ri}"][data-col="${ci}"]`);
  if(!td) return;
  const oldVal = csvData[ri]?.[ci] ?? '';
  const newVal = editor.value;
  if(oldVal !== newVal) {
    saveUndo();
    if(!csvData[ri]) csvData[ri] = [];
    csvData[ri][ci] = newVal;
    const span = document.getElementById(`cell-${ri}-${ci}`);
    if(span) span.textContent = newVal;
    document.getElementById('cell-val-preview').textContent = newVal;
  }
  td.classList.remove('cell-editing');
  editor.style.display = 'none';
  isEditing = false;
  document.getElementById('mode-indicator').innerHTML = '<div class="mode-dot"></div><span>آماده</span>';
}

function editorKey(e, ri, ci) {
  if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); finishEdit(ri,ci); if(ri+1<csvData.length) { selectCell(ri+1,ci); startEdit(ri+1,ci); } }
  if(e.key === 'Tab') { e.preventDefault(); finishEdit(ri,ci); const nc = e.shiftKey ? ci-1 : ci+1; if(nc>=0 && nc<headers.length) { selectCell(ri,nc); startEdit(ri,nc); } }
  if(e.key === 'Escape') { const editor=document.getElementById(`editor-${ri}-${ci}`); editor.value=csvData[ri]?.[ci]??''; finishEdit(ri,ci); }
}

function editHeader(e, ci) {
  e.stopPropagation();
  const span = document.getElementById(`th-label-${ci}`);
  if(!span) return;
  const old = headers[ci];
  span.innerHTML = `<input class="header-edit-input" id="h-input-${ci}" value="${escH(old)}">`;
  const inp = document.getElementById(`h-input-${ci}`);
  inp.focus(); inp.select();
  inp.onblur = () => { saveUndo(); headers[ci] = inp.value || old; renderHeaders(); };
  inp.onkeydown = e => { if(e.key==='Enter'||e.key==='Escape') inp.blur(); };
}

function selectRow(ri, e) {
  if(e.ctrlKey || e.metaKey) {
    if(selectedRows.has(ri)) selectedRows.delete(ri); else selectedRows.add(ri);
  } else if(e.shiftKey && selectedRows.size) {
    const last = Math.max(...selectedRows);
    const min = Math.min(last, ri), max = Math.max(last, ri);
    for(let i=min;i<=max;i++) selectedRows.add(i);
  } else {
    selectedRows.clear();
    selectedRows.add(ri);
  }
  document.getElementById('del-row-btn').style.display = selectedRows.size ? '' : 'none';
  renderBody();
  updateStats();
}

function sortBy(ci) {
  saveUndo();
  if(sortCol === ci) sortDir *= -1;
  else { sortCol = ci; sortDir = 1; }
  const type = detectColType(ci, csvData);
  csvData.sort((a,b) => {
    let va = a[ci]??'', vb = b[ci]??'';
    if(type==='num') { va=parseFloat(va)||0; vb=parseFloat(vb)||0; }
    else { va=String(va).toLowerCase(); vb=String(vb).toLowerCase(); }
    return (va<vb?-1:va>vb?1:0)*sortDir;
  });
  renderAll();
}

function addRow() {
  saveUndo();
  const newRow = headers.map(() => '');
  csvData.push(newRow);
  renderBody();
  updateStats();
  const lastRi = csvData.length - 1;
  setTimeout(() => {
    const el = document.querySelector(`tr[data-row="${lastRi}"]`);
    if(el) el.scrollIntoView({block:'nearest'});
    startEdit(lastRi, 0);
  }, 50);
  showNotif('ردیف جدید اضافه شد', 'info');
}

function addColumn() {
  saveUndo();
  const name = `ستون ${headers.length+1}`;
  headers.push(name);
  colWidths.push(140);
  csvData.forEach(r => r.push(''));
  renderAll();
  buildOverview();
  showNotif('ستون جدید اضافه شد', 'info');
}

function deleteSelectedRows() {
  if(!selectedRows.size) return;
  saveUndo();
  const indices = [...selectedRows].sort((a,b)=>b-a);
  indices.forEach(i => csvData.splice(i, 1));
  selectedRows.clear();
  renderAll();
  document.getElementById('del-row-btn').style.display = 'none';
  showNotif(`${indices.length} ردیف حذف شد`, 'info');
}

function copySelectedRows() {
  const rows = selectedRows.size
    ? [...selectedRows].sort().map(i=>csvData[i])
    : selectedCell ? [csvData[selectedCell[0]]] : [];
  if(!rows.length) return;
  copiedRows = rows.map(r=>[...r]);
  const text = rows.map(r=>r.join('\t')).join('\n');
  navigator.clipboard.writeText(text).catch(()=>{});
  showNotif('کپی شد ✓', 'success');
}

function saveCSV() {
  const content = toCSV(csvData, headers, delimiter);
  const blob = new Blob(['\ufeff'+content], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = currentFile ? currentFile.name : 'output.csv';
  a.click();
  URL.revokeObjectURL(url);
  showNotif('فایل ذخیره شد ✓', 'success');
}

function newCSV() {
  if(csvData.length && !confirm('آیا می‌خواهید جدول فعلی را ببندید؟')) return;
  headers = ['ستون ۱','ستون ۲','ستون ۳'];
  csvData = [['','',''],['','',''],['','','']];
  colWidths = [140,140,140];
  currentFile = null;
  document.getElementById('filename-display').textContent = 'جدول جدید';
  delimiter = ',';
  processCSV(toCSV(csvData, headers, delimiter));
  showNotif('جدول جدید ایجاد شد', 'info');
}

function searchData(q) {
  searchQuery = q.trim().toLowerCase();
  renderBody();
  updateStats();
}

function updateStats() {
  const filtered = searchQuery ? csvData.filter(r=>r.some(c=>String(c||'').toLowerCase().includes(searchQuery))) : csvData;
  document.getElementById('stat-rows').textContent = filtered.length;
  document.getElementById('stat-cols').textContent = headers.length;
  document.getElementById('stat-sel').textContent = selectedRows.size;
}

function saveUndo() {
  undoStack.push({headers:[...headers], data:csvData.map(r=>[...r])});
  if(undoStack.length > 50) undoStack.shift();
}

function undo() {
  if(!undoStack.length) { showNotif('چیزی برای بازگشت وجود ندارد', 'error'); return; }
  const state = undoStack.pop();
  headers = state.headers;
  csvData = state.data;
  renderAll();
  buildOverview();
  showNotif('بازگشت انجام شد', 'info');
}

function buildOverview() {
  const list = document.getElementById('col-list');
  list.innerHTML = headers.map((h,i) => {
    const c = colColors[i % colColors.length];
    return `<div class="col-item" onclick="scrollToCol(${i})">
      <div class="col-dot" style="background:${c}"></div>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${escH(h)}</span>
    </div>`;
  }).join('');
}

let overviewOpen = false;
function toggleOverview() {
  overviewOpen = !overviewOpen;
  document.getElementById('overview').classList.toggle('open', overviewOpen);
}

function scrollToCol(ci) {
  const th = document.querySelector(`#csv-table thead th:nth-child(${ci+2})`);
  if(th) th.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function showNotif(msg, type='info') {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.className = `show ${type}`;
  clearTimeout(n._t);
  n._t = setTimeout(() => n.className = '', 2500);
}

let resizingCol = -1, resizeStartX = 0, resizeStartW = 0;
function startResize(e, ci) {
  e.stopPropagation();
  resizingCol = ci; resizeStartX = e.clientX; resizeStartW = colWidths[ci];
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  document.querySelector(`.th-resize:nth-of-type(${ci+1})`);
}
document.addEventListener('mousemove', e => {
  if(resizingCol<0) return;
  const dx = e.clientX - resizeStartX;
  colWidths[resizingCol] = Math.max(60, resizeStartW + dx);
  const ths = document.querySelectorAll('#csv-table thead th');
  if(ths[resizingCol+1]) ths[resizingCol+1].style.width = colWidths[resizingCol] + 'px';
});
document.addEventListener('mouseup', () => {
  resizingCol = -1;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});

function showCtx(e, ri) {
  e.preventDefault();
  ctxRowIndex = ri;
  const m = document.getElementById('ctx-menu');
  m.style.display = 'block';
  let x = e.clientX, y = e.clientY;
  if(x + 170 > window.innerWidth) x -= 170;
  if(y + 200 > window.innerHeight) y -= 200;
  m.style.left = x + 'px';
  m.style.top = y + 'px';
}
document.addEventListener('click', () => document.getElementById('ctx-menu').style.display = 'none');

function ctxAddRowAbove() { saveUndo(); csvData.splice(ctxRowIndex,0,headers.map(()=>'')); renderBody(); updateStats(); }
function ctxAddRowBelow() { saveUndo(); csvData.splice(ctxRowIndex+1,0,headers.map(()=>'')); renderBody(); updateStats(); }
function ctxCopyRow() { copiedRows = [csvData[ctxRowIndex]?[...csvData[ctxRowIndex]]:headers.map(()=>'')]; showNotif('ردیف کپی شد', 'success'); }
function ctxPasteRow() { if(!copiedRows.length) return; saveUndo(); csvData.splice(ctxRowIndex+1,0,...copiedRows.map(r=>[...r])); renderBody(); updateStats(); showNotif('ردیف جایگذاری شد', 'success'); }
function ctxDeleteRow() { saveUndo(); csvData.splice(ctxRowIndex,1); renderBody(); updateStats(); showNotif('ردیف حذف شد', 'info'); }

function reparse() {
  delimiter = document.getElementById('delimiter-select').value;
  if(originalText) processCSV(originalText);
}

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); const f = e.dataTransfer.files[0]; if(f) loadFile(f); });

document.getElementById('file-input').addEventListener('change', e => { const f = e.target.files[0]; if(f) loadFile(f); });

document.addEventListener('keydown', e => {
  if(isEditing) return;
  if((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); undo(); return; }
  if((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); if(csvData.length) saveCSV(); return; }
  if((e.ctrlKey||e.metaKey) && e.key==='c') { copySelectedRows(); return; }
  if(e.key==='Delete'||e.key==='Backspace') {
    if(selectedCell && !isEditing) {
      saveUndo();
      const [ri,ci] = selectedCell;
      csvData[ri][ci] = '';
      const span = document.getElementById(`cell-${ri}-${ci}`);
      if(span) span.textContent = '';
    }
    return;
  }
  if(selectedCell) {
    const [ri,ci] = selectedCell;
    if(e.key==='ArrowDown' && ri+1<csvData.length) { e.preventDefault(); selectCell(ri+1,ci); }
    if(e.key==='ArrowUp' && ri>0) { e.preventDefault(); selectCell(ri-1,ci); }
    if(e.key==='ArrowRight' && ci>0) { e.preventDefault(); selectCell(ri,ci-1); }
    if(e.key==='ArrowLeft' && ci+1<headers.length) { e.preventDefault(); selectCell(ri,ci+1); }
    if(e.key==='Enter') startEdit(ri,ci);
    if(e.key==='F2') startEdit(ri,ci);
    if(e.key.length===1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
      startEdit(ri,ci);
      setTimeout(()=>{const ed=document.getElementById(`editor-${ri}-${ci}`);if(ed){ed.value=e.key;ed.setSelectionRange(1,1);}},0);
    }
  }
});

document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  if(e.target.closest('#drop-zone')||e.target.closest('#table-area')) return;
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if(f && (f.name.endsWith('.csv')||f.name.endsWith('.tsv')||f.name.endsWith('.txt'))) loadFile(f);
});

// touch support for mobile
let touchStartX, touchStartY;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});
</script>
</body>
</html>
